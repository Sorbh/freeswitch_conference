  <div id="root"><div id="hq-preloader" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#fbfaf8;gap:24px"><style>@media(prefers-color-scheme:dark){#hq-preloader{background:#111114!important}#hq-preloader .pl-brand{color:#f0eeeb!important}#hq-preloader .pl-sub{color:#9a958d!important}}@keyframes pl-pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}@keyframes pl-wave1{0%,100%{opacity:1}50%{opacity:.3}}@keyframes pl-wave2{0%,100%{opacity:.7}50%{opacity:.15}}@keyframes pl-glow{0%,100%{opacity:.15}50%{opacity:.35}}@keyframes pl-vib{0%{transform:rotate(0)}3%{transform:rotate(-2.5deg)}6%{transform:rotate(2.5deg)}9%{transform:rotate(-2deg)}12%{transform:rotate(1.5deg)}15%,100%{transform:rotate(0)}}@keyframes pl-fade{0%{opacity:.45}100%{opacity:1}}</style><svg width="64" height="64" viewBox="0 0 48 48" fill="none" style="animation:pl-pop .5s cubic-bezier(.34,1.56,.64,1) both"><circle cx="24" cy="24" r="22" fill="#d92d20" style="animation:pl-glow 2s ease-in-out infinite"/><rect x="1.5" y="1.5" width="45" height="45" rx="13" fill="#d92d20"/><g style="transform-origin:24px 24px;animation:pl-vib 2s ease-in-out infinite"><path d="M33.8 30.7v2.6a2.3 2.3 0 0 1-2.5 2.3 23 23 0 0 1-10-3.6 22.7 22.7 0 0 1-7-7 23 23 0 0 1-3.5-10.1 2.3 2.3 0 0 1 2.3-2.5h2.6a2.3 2.3 0 0 1 2.3 2c.1 1 .4 2.1.7 3.1a2.3 2.3 0 0 1-.5 2.4l-1.1 1.1a18.4 18.4 0 0 0 6.7 6.7l1.1-1.1a2.3 2.3 0 0 1 2.4-.5c1 .3 2 .6 3.1.7a2.3 2.3 0 0 1 2 2.3z" fill="#fff"/></g><path d="M30.5 13.6a8.6 8.6 0 0 1 5 5" stroke="#fff" stroke-width="2.6" stroke-linecap="round" style="animation:pl-wave1 1.4s ease-in-out infinite"/><path d="M32.8 8.4a14.3 14.3 0 0 1 8 8" stroke="#ffb4ad" stroke-width="2.6" stroke-linecap="round" style="animation:pl-wave2 1.4s ease-in-out infinite .2s"/></svg><div class="pl-brand" style="font:800 20px -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#16181d;letter-spacing:-.01em;animation:pl-pop .5s cubic-b   <script type="module" src="/src/main.jsx"></script>
  <script>
    // Load Google Fonts after page is interactive (not during FCP/LCP)
    function loadFonts(){
      var l=document.createElement('link');
      l.rel='stylesheet';
      l.href='https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=optional';
      document.head.appendChild(l);
    }
    if('requestIdleCallback' in window) requestIdleCallback(loadFonts);
    else setTimeout(loadFonts,1);

    // Clarity — deferred to idle
    function loadClarity(){
      var tz;
      try{tz=Intl.DateTimeFormat().resolvedOptions().timeZone}catch(e){}
      if(tz==='Asia/Kolkata'||tz==='Asia/Calcutta')return;
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window,document,"clarity","script","xavilq840o");
      var p=new URLSearchParams(window.location.search);
      ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach(function(k){
        var v=p.get(k);if(v)window.clarity('set',k,v);
      });
    }
    if('requestIdleCallback' in window) requestIdleCallback(loadClarity);
    else setTimeout(loadClarity,2000);
  </script>
