<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotline HQ</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#d92d20" />
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Hotline HQ" />
  <meta name="mobile-web-app-capable" content="yes" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Load Google Fonts after page is interactive (not during FCP/LCP)
    function loadFonts(){
      var l=document.createElement('link');
      l.rel='stylesheet';
      l.href='https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=Instrument+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=optional';
      document.head.appendChild(l);
    }
    if('requestIdleCallback' in window) requestIdleCallback(loadFonts);
    else setTimeout(loadFonts,1);

    // Clarity — deferred to idle
    function loadClarity(){
      var tz;
      try{tz=Intl.DateTimeFormat().resolvedOptions().timeZone}catch(e){}
      if(tz==='Asia/Kolkata'||tz==='Asia/Calcutta')return;
      (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
      })(window,document,"clarity","script","xavilq840o");
      var p=new URLSearchParams(window.location.search);
      ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'].forEach(function(k){
        var v=p.get(k);if(v)window.clarity('set',k,v);
      });
    }
    if('requestIdleCallback' in window) requestIdleCallback(loadClarity);
    else setTimeout(loadClarity,2000);
  </script>
</body>
</html>
