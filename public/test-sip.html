<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redline Conference</title>
    <script src="/jssip.bundle.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* Login screen */
        .login-container { width: 100%; max-width: 400px; padding: 20px; }
        .login-card { background: #16213e; border-radius: 16px; padding: 40px 32px; border: 1px solid #0f3460; }
        .login-card h1 { text-align: center; font-size: 24px; margin-bottom: 8px; color: #fff; }
        .login-card .subtitle { text-align: center; font-size: 14px; color: #888; margin-bottom: 32px; }
        .field { margin-bottom: 16px; }
        .field label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
        .field input { width: 100%; padding: 12px 16px; background: #0f3460; border: 1px solid #1a4a8a; border-radius: 10px; color: #eee; font-size: 15px; outline: none; transition: border-color 0.2s; }
        .field input:focus { border-color: #e94560; }
        .login-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; background: #e94560; color: white; transition: background 0.2s; margin-top: 8px; }
        .login-btn:hover { background: #c73e54; }
        .login-btn:disabled { background: #555; cursor: not-allowed; }
        .login-error { text-align: center; font-size: 13px; color: #e74c3c; margin-top: 12px; min-height: 20px; }
        .login-status { text-align: center; font-size: 13px; color: #f1c40f; margin-top: 12px; min-height: 20px; }

        /* Conference screen */
        .conf-container { width: 100%; max-width: 500px; padding: 20px; display: none; }
        .conf-card { background: #16213e; border-radius: 16px; padding: 32px; border: 1px solid #0f3460; text-align: center; }
        .conf-user { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .conf-company { font-size: 14px; color: #888; margin-bottom: 4px; }
        .conf-room { font-size: 14px; color: #e94560; font-weight: 600; margin-bottom: 24px; }
        .conf-status { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 600; margin-bottom: 24px; }
        .conf-status.connecting { background: #f39c1233; color: #f1c40f; }
        .conf-status.connected { background: #27ae6033; color: #2ecc71; }
        .conf-status.disconnected { background: #c0392b33; color: #e74c3c; }
        .conf-status.idle { background: #3498db33; color: #3498db; }
        .conf-status.deactivated { background: #95a5a633; color: #bdc3c7; }
        .conf-reg { font-size: 12px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .conf-reg .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .conf-reg .dot.green { background: #2ecc71; }
        .conf-reg .dot.yellow { background: #f1c40f; }
        .conf-reg .dot.red { background: #e74c3c; }
        .conf-standby-msg { font-size: 13px; color: #888; margin-top: 16px; }
        .btn-join { background: #27ae60; color: #fff; padding: 14px 36px; }
        .btn-join:hover { background: #219a52; }

        .conf-timer { font-size: 48px; font-weight: 700; font-family: 'JetBrains Mono', 'Courier New', monospace; letter-spacing: 2px; margin-bottom: 32px; color: #fff; }

        .conf-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .conf-btn { padding: 14px 28px; border: none; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
        .conf-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-mute { background: #f39c12; color: #fff; }
        .btn-mute:hover:not(:disabled) { background: #d68910; }
        .btn-mute.live { background: #27ae60; }
        .btn-mute.live:hover:not(:disabled) { background: #219a52; }
        .btn-leave { background: #2980b9; color: #fff; }
        .btn-leave:hover:not(:disabled) { background: #2471a3; }
        .btn-hangup { background: #c0392b; color: #fff; }
        .btn-hangup:hover:not(:disabled) { background: #a93226; }
        .btn-logout { background: #7f8c8d; color: #fff; padding: 10px 20px; border: none; border-radius: 10px; font-size: 13px; cursor: pointer; margin-top: 20px; }
        .btn-logout:hover { background: #636e72; }

        .conf-mic-icon { font-size: 20px; }

        audio { display: none; }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="loginScreen">
        <div class="login-card">
            <h1>Redline Conference</h1>
            <p class="subtitle">Sign in to join your conference room</p>
            <div class="field">
                <label>Email</label>
                <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
            </div>
            <button class="login-btn" id="btnLogin" onclick="doLogin()">Join Conference</button>
            <div class="login-status" id="loginStatus"></div>
            <div class="login-error" id="loginError"></div>
        </div>
    </div>

    <!-- Conference Screen -->
    <div class="conf-container" id="confScreen">
        <div class="conf-card">
            <div class="conf-user" id="confUser">-</div>
            <div class="conf-company" id="confCompany">-</div>
            <div class="conf-room" id="confRoom">-</div>
            <div class="conf-reg" id="confReg"><span class="dot yellow"></span> <span>Registering...</span></div>
            <div class="conf-status disconnected" id="confStatus">Connecting...</div>
            <div class="conf-timer" id="confTimer">00:00</div>
            <div class="conf-actions" id="confActions">
                <button class="conf-btn btn-mute" id="btnMute" onclick="toggleMute()" disabled>
                    <span class="conf-mic-icon" id="muteIcon">🔇</span>
                    <span id="muteLabel">Unmute (Ctrl+L)</span>
                </button>
            </div>
            <div class="conf-actions" id="confIdleActions" style="display:none">
                <button class="conf-btn btn-join" onclick="joinConference()">Join Conference</button>
            </div>
            <div class="conf-standby-msg" id="confStandbyMsg" style="display:none"></div>
            <button class="btn-logout" onclick="logout()">Logout</button>
        </div>
    </div>

    <audio id="remoteAudio" autoplay></audio>

    <script>
        let ua = null;
        let currentSession = null;
        let isMuted = true;
        let callTimer = null;
        let callSeconds = 0;
        let accountData = null;
        let keepAliveTimer = null;
        let sipUserGlobal = null;
        let loggingOut = false;
        let regRetryTimer = null;

        const host = window.location.hostname || 'localhost';
        const wsServer = window.location.protocol === 'https:'
            ? `wss://${host}:5072`
            : `ws://${host}:5071`;
        const sipDomain = host;

        function showStatus(msg) {
            document.getElementById('loginStatus').textContent = msg;
            document.getElementById('loginError').textContent = '';
        }

        function showError(msg) {
            document.getElementById('loginError').textContent = msg;
            document.getElementById('loginStatus').textContent = '';
        }

        function setRegStatus(state, text) {
            const el = document.getElementById('confReg');
            if (!el) return;
            const colors = { registered: 'green', registering: 'yellow', unregistered: 'red' };
            el.innerHTML = `<span class="dot ${colors[state] || 'red'}"></span> <span>${text}</span>`;
        }

        function generateMac(email) {
            let hash = 0;
            for (let i = 0; i < email.length; i++) {
                hash = ((hash << 5) - hash + email.charCodeAt(i)) | 0;
            }
            const bytes = [];
            let h = Math.abs(hash);
            for (let i = 0; i < 6; i++) {
                bytes.push(((h >> (i * 4)) & 0xFF).toString(16).padStart(2, '0'));
            }
            bytes[0] = (parseInt(bytes[0], 16) & 0xFE | 0x02).toString(16).padStart(2, '0');
            return bytes.join(':');
        }

        function startKeepAlive() {
            if (keepAliveTimer) return;
            keepAliveTimer = setInterval(() => {
                if (!ua || !ua.isRegistered()) return;
                const target = `sip:${sipUserGlobal}@${sipDomain}`;
                ua.sendMessage(target, 'keep-alive', {
                    contentType: 'text/plain',
                    eventHandlers: {
                        succeeded: () => { console.log('[KEEP-ALIVE] sent MESSAGE -> 200 OK'); },
                        failed: (e) => { console.warn('[KEEP-ALIVE] sent MESSAGE -> failed', e.cause); },
                    }
                });
            }, 30000);
        }

        function stopKeepAlive() {
            if (keepAliveTimer) {
                clearInterval(keepAliveTimer);
                keepAliveTimer = null;
            }
        }

        async function doLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please enter email and password.');
                return;
            }

            document.getElementById('btnLogin').disabled = true;
            showStatus('Connecting...');

            try {
                const sipUser = email.replace('@', '.at.');
                sipUserGlobal = sipUser;
                const mac = generateMac(email);

                if (typeof JsSIP === 'undefined') {
                    showError('SIP library not loaded.');
                    document.getElementById('btnLogin').disabled = false;
                    return;
                }

                JsSIP.debug.enable('JsSIP:*');

                const socket = new JsSIP.WebSocketInterface(wsServer);
                const config = {
                    sockets: [socket],
                    uri: `sip:${sipUser}@${sipDomain}`,
                    password: password,
                    display_name: email,
                    register: true,
                    register_expires: 120,
                    session_timers: false,
                    connection_recovery_min_interval: 2,
                    connection_recovery_max_interval: 30,
                    user_agent: `Redline-WebClient/1.0 ${mac}`,
                };

                ua = new JsSIP.UA(config);

                ua.on('registered', async () => {
                    console.log('SIP registered successfully for:', email);
                    setRegStatus('registered', 'Registered');
                    startKeepAlive();
                    if (regRetryTimer) { clearInterval(regRetryTimer); regRetryTimer = null; }
                    sessionStorage.setItem('sip_credentials', JSON.stringify({ email, password }));

                    // Already loaded — just update status on re-registration
                    if (accountData) {
                        console.log('[SIP] Re-registered');
                        return;
                    }

                    showStatus('Authenticated. Loading account...');
                    try {
                        const lookupUrl = `/api/v1/admin/account-lookup?email=${encodeURIComponent(email)}`;
                        console.log('Fetching account:', lookupUrl);
                        const res = await fetch(lookupUrl);
                        console.log('Account lookup response status:', res.status);
                        const json = await res.json();
                        console.log('Account lookup response:', JSON.stringify(json, null, 2));
                        accountData = json.data || json;

                        if (!accountData || !accountData.room) {
                            console.error('No room in account data:', accountData);
                            showError('No conference room assigned to your account.');
                            sessionStorage.removeItem('sip_credentials');
                            ua.unregister();
                            ua.stop();
                            ua = null;
                            document.getElementById('btnLogin').disabled = false;
                            return;
                        }

                        console.log('Account loaded:', accountData.display_name, 'Room:', accountData.room);

                        showConfScreen();

                        if (!accountData.active) {
                            showDeactivatedState();
                        } else {
                            showIdleState();
                        }
                    } catch (e) {
                        console.error('Account lookup failed:', e);
                        showError('Failed to load account details: ' + e.message);
                        document.getElementById('btnLogin').disabled = false;
                    }
                });

                ua.on('registrationFailed', (e) => {
                    const cause = e.cause || '';
                    console.error('SIP registration failed:', cause, e);

                    // Only kill UA on hard auth failure during initial login
                    if (!accountData && (cause === 'Rejected' || cause === 'Forbidden')) {
                        stopKeepAlive();
                        sessionStorage.removeItem('sip_credentials');
                        setRegStatus('unregistered', 'Auth Failed');
                        showError('Invalid email or password. (' + cause + ')');
                        document.getElementById('btnLogin').disabled = false;
                        ua.stop();
                        ua = null;
                        return;
                    }

                    // Once logged in, never kill UA — keep retrying like a Yealink
                    console.log(`[SIP] Registration failed (${cause}), retrying in 30s`);
                    stopKeepAlive();
                    setRegStatus('registering', `Re-registering... (${cause || 'timeout'})`);
                    if (accountData) {
                        document.getElementById('confStatus').textContent = 'Re-registering...';
                        document.getElementById('confStatus').className = 'conf-status connecting';
                    } else {
                        showStatus('Server unavailable, retrying...');
                    }

                    // jsSIP Registrator doesn't reschedule after failure — fill the gap
                    if (!regRetryTimer && ua) {
                        regRetryTimer = setInterval(() => {
                            if (!ua) { clearInterval(regRetryTimer); regRetryTimer = null; return; }
                            if (ua.isRegistered()) { clearInterval(regRetryTimer); regRetryTimer = null; return; }
                            console.log('[SIP] Retry REGISTER');
                            ua.register();
                        }, 30000);
                    }
                });

                ua.on('unregistered', () => {
                    if (loggingOut) return;
                    console.warn('[SIP] Unregistered');
                    stopKeepAlive();
                    setRegStatus('unregistered', 'Not Registered');
                    if (accountData) {
                        document.getElementById('confStatus').textContent = 'Unregistered';
                        document.getElementById('confStatus').className = 'conf-status disconnected';
                    }
                });

                ua.on('disconnected', (e) => {
                    if (loggingOut) return;
                    stopKeepAlive();
                    console.warn('[SIP] WebSocket disconnected, jsSIP will auto-reconnect');
                    setRegStatus('unregistered', 'Disconnected');
                    if (accountData) {
                        document.getElementById('confStatus').textContent = 'Reconnecting...';
                        document.getElementById('confStatus').className = 'conf-status connecting';
                    } else {
                        showStatus('Connection lost, reconnecting...');
                    }
                });

                ua.on('connected', () => {
                    console.log('[SIP] WebSocket reconnected');
                    setRegStatus('registering', 'Registering...');
                });

                ua.on('newMessage', (data) => {
                    if (data.originator === 'remote') {
                        data.message.accept();
                    }
                });

                ua.on('newRTCSession', (data) => {
                    if (data.originator === 'remote') {
                        const session = data.session;
                        session.on('peerconnection', (pcData) => {
                            pcData.peerconnection.ontrack = () => attachRemoteAudio(session);
                        });
                        session.on('accepted', () => {
                            currentSession = session;
                            onCallConnected();
                            attachRemoteAudio(session);
                        });
                        session.on('failed', () => resetCallState());
                        session.on('ended', () => resetCallState());
                        session.answer({
                            mediaConstraints: { audio: true, video: false },
                            pcConfig: { iceServers: [] },
                        });
                    }
                });

                console.log('SIP UA starting, connecting to', wsServer, 'as', sipUser, 'MAC:', mac);
                ua.start();
            } catch (e) {
                console.error('SIP connection error:', e);
                showError('Connection error: ' + e.message);
                document.getElementById('btnLogin').disabled = false;
            }
        }

        function showConfScreen() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('confScreen').style.display = 'block';

            const roomNames = {
                123456701: 'California', 123456702: 'Texas', 123456703: 'Florida',
                123456704: 'Mexico', 123456705: 'ENS', 123456706: 'Arizona',
                123456707: 'Ohio', 123456708: 'New York', 123456709: 'Georgia',
                123456710: 'Indiana', 123456711: 'Michigan', 123456712: 'Carolinas',
            };

            document.getElementById('confUser').textContent = accountData.display_name || accountData.email;
            document.getElementById('confCompany').textContent = accountData.company_name || '';
            document.getElementById('confRoom').textContent = roomNames[accountData.room] || `Room ${accountData.room}`;
            document.getElementById('confStatus').textContent = 'Connecting...';
            document.getElementById('confStatus').className = 'conf-status connecting';
            document.getElementById('confActions').style.display = 'none';
            document.getElementById('confIdleActions').style.display = 'none';
            document.getElementById('confStandbyMsg').style.display = 'none';
        }

        function showIdleState() {
            document.getElementById('confStatus').textContent = 'Idle';
            document.getElementById('confStatus').className = 'conf-status idle';
            document.getElementById('confTimer').textContent = '--:--';
            document.getElementById('confActions').style.display = 'none';
            document.getElementById('confIdleActions').style.display = 'flex';
            document.getElementById('confStandbyMsg').style.display = 'none';
        }

        function showDeactivatedState() {
            document.getElementById('confStatus').textContent = 'Deactivated';
            document.getElementById('confStatus').className = 'conf-status deactivated';
            document.getElementById('confTimer').textContent = '--:--';
            document.getElementById('confActions').style.display = 'none';
            document.getElementById('confIdleActions').style.display = 'none';
            document.getElementById('confStandbyMsg').style.display = 'block';
            document.getElementById('confStandbyMsg').textContent = 'Your account is currently deactivated. Contact your administrator to reactivate.';
        }

        async function joinConference() {
            if (!accountData) return;
            const userName = `sip:${accountData.email}`;
            console.log('Joining conference for:', userName);
            document.getElementById('confStatus').textContent = 'Connecting...';
            document.getElementById('confStatus').className = 'conf-status connecting';
            document.getElementById('confIdleActions').style.display = 'none';
            try {
                const res = await fetch(`/api/v1/admin/users/${encodeURIComponent(userName)}/reconnect`, { method: 'POST' });
                const json = await res.json();
                console.log('Join response:', json);
                if (!json.status) {
                    console.error('Join error:', json.error);
                    showIdleState();
                }
            } catch (e) {
                console.error('Join failed:', e);
                showIdleState();
            }
        }

        async function reconnect() {
            if (!accountData) return;
            const userName = `sip:${accountData.email}`;
            console.log('Requesting backend reconnect for:', userName);
            document.getElementById('confStatus').textContent = 'Reconnecting...';
            document.getElementById('confStatus').className = 'conf-status connecting';
            try {
                const res = await fetch(`/api/v1/admin/users/${encodeURIComponent(userName)}/reconnect`, { method: 'POST' });
                const json = await res.json();
                console.log('Reconnect response:', json);
                if (!json.status) {
                    console.error('Reconnect error:', json.error);
                }
            } catch (e) {
                console.error('Reconnect failed:', e);
            }
        }

        function onCallConnected() {
            document.getElementById('confStatus').textContent = 'Connected';
            document.getElementById('confStatus').className = 'conf-status connected';
            document.getElementById('confActions').style.display = 'flex';
            document.getElementById('confIdleActions').style.display = 'none';
            document.getElementById('confStandbyMsg').style.display = 'none';
            document.getElementById('btnMute').disabled = false;

            isMuted = true;
            muteAudio(true);
            updateMuteUI();

            if (callTimer) clearInterval(callTimer);
            callSeconds = 0;
            callTimer = setInterval(() => {
                callSeconds++;
                const min = String(Math.floor(callSeconds / 60)).padStart(2, '0');
                const sec = String(callSeconds % 60).padStart(2, '0');
                document.getElementById('confTimer').textContent = `${min}:${sec}`;
            }, 1000);

            attachRemoteAudio(currentSession);
        }

        function hangup() {
            if (currentSession) {
                console.log('[HANGUP] Sending BYE to FreeSWITCH');
                currentSession.terminate();
                currentSession = null;
            }
            resetCallState();
            document.getElementById('confStatus').textContent = 'Disconnected';
            document.getElementById('confStatus').className = 'conf-status disconnected';
        }

        function logout() {
            loggingOut = true;
            stopKeepAlive();
            if (regRetryTimer) { clearInterval(regRetryTimer); regRetryTimer = null; }
            if (currentSession) {
                currentSession.terminate();
                currentSession = null;
            }
            if (ua) {
                ua.unregister();
                ua.stop();
                ua = null;
            }
            accountData = null;
            sipUserGlobal = null;
            sessionStorage.removeItem('sip_credentials');
            document.getElementById('confScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('btnLogin').disabled = false;
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
            showStatus('');
            showError('');
        }

        async function toggleMute() {
            isMuted = !isMuted;
            muteAudio(isMuted);
            updateMuteUI();

            if (!accountData) return;
            const userName = `sip:${accountData.email}`;
            const hookEvent = isMuted ? 'on_hook' : 'off_hook';
            try {
                await fetch(`/api/v1/admin/users/${encodeURIComponent(userName)}/hook`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ event: hookEvent }),
                });
                console.log(`[HOOK] ${hookEvent} sent to server`);
            } catch (e) {
                console.error(`[HOOK] Failed to send ${hookEvent}:`, e);
            }
        }

        function updateMuteUI() {
            const btn = document.getElementById('btnMute');
            document.getElementById('muteIcon').textContent = isMuted ? '🔇' : '🔊';
            document.getElementById('muteLabel').textContent = isMuted ? 'Unmute' : 'Mute';
            btn.className = isMuted ? 'conf-btn btn-mute' : 'conf-btn btn-mute live';
        }

        function muteAudio(mute) {
            if (!currentSession || !currentSession.connection) return;
            currentSession.connection.getSenders().forEach(sender => {
                if (sender.track && sender.track.kind === 'audio') {
                    sender.track.enabled = !mute;
                }
            });
        }

        function attachRemoteAudio(session) {
            if (!session || !session.connection) return;
            const tracks = session.connection.getReceivers()
                .filter(r => r.track && r.track.kind === 'audio')
                .map(r => r.track);
            if (tracks.length > 0) {
                const audio = document.getElementById('remoteAudio');
                audio.srcObject = new MediaStream(tracks);
                audio.play().catch(() => {});
            }
        }

        function resetCallState() {
            currentSession = null;
            if (callTimer) clearInterval(callTimer);
            callTimer = null;
            document.getElementById('confTimer').textContent = '00:00';
            document.getElementById('btnMute').disabled = true;
            document.getElementById('confActions').style.display = 'none';

            if (accountData && accountData.active) {
                showIdleState();
            } else {
                document.getElementById('confStatus').textContent = 'Disconnected';
                document.getElementById('confStatus').className = 'conf-status disconnected';
            }
        }

        document.addEventListener('keydown', (e) => {
            // Enter to login
            if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
                doLogin();
            }
            // Ctrl+L to toggle mute
            if (e.ctrlKey && e.key === 'l') {
                e.preventDefault();
                if (currentSession && !document.getElementById('btnMute').disabled) {
                    toggleMute();
                }
            }
        });

        if (typeof JsSIP === 'undefined') {
            showError('SIP library failed to load.');
        }

        // Auto-reconnect on page load if credentials are saved
        (function autoReconnect() {
            const saved = sessionStorage.getItem('sip_credentials');
            if (!saved) return;
            try {
                const { email, password } = JSON.parse(saved);
                if (!email || !password) return;
                console.log('[AUTO-RECONNECT] Restoring session for', email);
                document.getElementById('email').value = email;
                document.getElementById('password').value = password;
                doLogin();
            } catch (e) {
                sessionStorage.removeItem('sip_credentials');
            }
        })();
    </script>
</body>
</html>
